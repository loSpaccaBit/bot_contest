# ─── nginx.conf — Production reverse proxy for Domusbet Referral ──────────────

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ─── Performance ────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off;

    # ─── Gzip Compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ─── Rate Limiting ──────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=internal:10m rate=300r/m;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=600r/m;

    limit_req_status 429;

    # ─── Upstream Services ──────────────────────────────────────────────────
    upstream api_backend {
        server api:3001;
        keepalive 32;
    }

    upstream admin_web_backend {
        server admin-web:3000;
        keepalive 16;
    }

    upstream bot_webhook_backend {
        server bot:3002;
        keepalive 8;
    }

    # ─── WebSocket upgrade map ───────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ════════════════════════════════════════════════════════════════════════
    # api.fcast7.it — API NestJS + Webhook Bot Telegram
    # ════════════════════════════════════════════════════════════════════════

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name api.fcast7.it;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name api.fcast7.it;

        ssl_certificate     /etc/letsencrypt/live/api.fcast7.it/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.fcast7.it/privkey.pem;
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling        on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/api.fcast7.it/chain.pem;
        resolver            1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout    5s;

        client_max_body_size 10m;
        client_body_buffer_size 128k;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ─── Health check ─────────────────────────────────────────────────
        location = /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ─── Webhook Telegram Bot ─────────────────────────────────────────
        # Telegram invia POST a questo path — nessun rate limit aggressivo
        location = /bot-webhook {
            limit_req zone=webhook burst=100 nodelay;

            proxy_pass         http://bot_webhook_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ─── API: Auth endpoints (strict rate limit) ──────────────────────
        location ~ ^/api/auth {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
        }

        # ─── API: Internal endpoints (bot / worker) ───────────────────────
        location ~ ^/api/internal {
            limit_req zone=internal burst=50 nodelay;

            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ─── API: tutte le altre route ────────────────────────────────────
        location /api/ {
            limit_req zone=general burst=20 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;

            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        }

        # ─── Error pages ──────────────────────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            internal;
            return 429 '{"statusCode":429,"message":"Troppe richieste, riprova tra poco."}';
            add_header Content-Type application/json always;
            add_header Retry-After 60 always;
        }

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            return 502 '{"statusCode":502,"message":"Servizio temporaneamente non disponibile."}';
            add_header Content-Type application/json always;
        }
    }

    # ════════════════════════════════════════════════════════════════════════
    # panel.fcast7.it — Admin Dashboard (Next.js)
    # ════════════════════════════════════════════════════════════════════════

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name panel.fcast7.it;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name panel.fcast7.it;

        ssl_certificate     /etc/letsencrypt/live/panel.fcast7.it/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/panel.fcast7.it/privkey.pem;
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling        on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/letsencrypt/live/panel.fcast7.it/chain.pem;
        resolver            1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout    5s;

        client_max_body_size 10m;
        client_body_buffer_size 128k;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.fcast7.it;" always;

        # ─── Next.js static assets (long cache) ──────────────────────────
        location /_next/static/ {
            proxy_pass         http://admin_web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;

            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }

        # ─── favicon e robots.txt ─────────────────────────────────────────
        location ~ ^/(favicon\.ico|robots\.txt)$ {
            proxy_pass         http://admin_web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            access_log off;
        }

        # ─── Tutte le route Next.js ───────────────────────────────────────
        location / {
            limit_req zone=general burst=30 nodelay;

            proxy_pass         http://admin_web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ─── Error pages ──────────────────────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            internal;
            return 429 '{"statusCode":429,"message":"Troppe richieste, riprova tra poco."}';
            add_header Content-Type application/json always;
            add_header Retry-After 60 always;
        }

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            return 502 '{"statusCode":502,"message":"Servizio temporaneamente non disponibile."}';
            add_header Content-Type application/json always;
        }
    }
}
