version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: domusbet_postgres
    environment:
      POSTGRES_DB: domusbet_referral
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - domusbet_network

  redis:
    image: redis:7-alpine
    container_name: domusbet_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - domusbet_network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: domusbet_api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/domusbet_referral
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=15m
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_EXPIRES_IN=7d
      - API_INTERNAL_SECRET=${API_INTERNAL_SECRET}
      - API_PORT=3001
      - API_HOST=0.0.0.0
      - CORS_ORIGIN=http://localhost:3000
      - LOG_LEVEL=info
      - APP_NAME=Domusbet Referral
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - domusbet_network
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: domusbet_bot
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BOT_API_URL=http://api:3001
      - BOT_API_INTERNAL_SECRET=${API_INTERNAL_SECRET}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/domusbet_referral
      - LOG_LEVEL=info
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - domusbet_network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: domusbet_worker
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - WORKER_API_URL=http://api:3001
      - WORKER_API_INTERNAL_SECRET=${API_INTERNAL_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - LOG_LEVEL=info
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - domusbet_network
    restart: unless-stopped

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    container_name: domusbet_admin_web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - domusbet_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  domusbet_network:
    driver: bridge
